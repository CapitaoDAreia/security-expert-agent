services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ciso-postgres
    ports:
      - "${PG_PORT}:${PG_PORT}"
    environment:
      - POSTGRES_DB=${PG_DB}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingest-api:
    build: .
    container_name: ciso-ingest-api
    env_file: .env
    ports:
      - "8001:8001"
    environment:
      - PG_HOST=db  # Important: at docker, host = service name
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DB=${PG_DB}
    depends_on:
      db:
        condition: service_healthy
    command: uv run uvicorn src.api.api_ingest:app --host 0.0.0.0 --port 8001

  ciso-agent:
    build: .
    container_name: ciso-agent-cli
    env_file: .env
    stdin_open: true # Allows terminal
    tty: true        # Allows terminal
    environment:
      - PG_HOST=db
    depends_on:
      db:
        condition: service_healthy
    command: uv run python -m src.main

  ciso-gui:
    build: .
    container_name: ciso-web-gui
    env_file: .env
    ports:
      - "8501:8501"
    environment:
      - PG_HOST=db
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: uv run streamlit run src/web/app.py --server.address 0.0.0.0

volumes:
  postgres_data: